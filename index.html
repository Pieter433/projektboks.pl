<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Projekt Boks</title>
    <link rel="icon" href="logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <div class="glow glow-a"></div>
      <div class="glow glow-b"></div>
      <div class="grid"></div>

      <section class="card">
        <img class="logo" src="logo.png" alt="Logo projektu" />
        <p class="eyebrow">Projekt BOKS</p>
        <h1>Strona jest w trakcie budowy</h1>
        <p class="lead">
          Strona jest w trakcie budowania. Wkrótce będziemy.
        </p>
        <div class="status">
          <span class="dot" aria-hidden="true"></span>
          <span>Widzimy się wkrótce</span>
        </div>
      </section>
    </main>
  </body>
</html>
